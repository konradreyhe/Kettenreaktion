<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden — Kettenreaktion</title>
  <style>
    @font-face {
      font-family: 'Orbitron';
      font-style: normal;
      font-weight: 400 900;
      font-display: swap;
      src: url('./assets/fonts/orbitron-latin.woff2') format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #8899bb;
      font-family: Orbitron, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 400px; }
    h1 { font-size: 48px; color: #4488ff; margin-bottom: 12px; }
    p { font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 12px 32px;
      background: #334488;
      color: #aabbee;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      transition: background 0.2s;
    }
    a:hover { background: #4455aa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Diese Seite gibt es nicht.<br>Vielleicht ist sie in einer Kettenreaktion verschwunden.</p>
    <a href="./">Zum Spiel</a>
  </div>
</body>
</html>
